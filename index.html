}

.btn:hover {
transform:translateY(-4px);

/* карточка */
.card {
margin-top:60px;

border-radius:20px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(212,176,106,0.2);

/* glow */
.glow {
position:absolute;
width:400px;
height:400px;
background:radial-gradient(circle,rgba(212,176,106,0.15),transparent);
filter:blur(80px);

right:-100px;
